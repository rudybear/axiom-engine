name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Build renderer
        run: cargo build -p axiom-renderer --release
      - name: Run renderer tests
        run: cargo test -p axiom-renderer
      - name: Clippy (correctness only)
        run: cargo clippy --workspace -- -D clippy::correctness -W clippy::suspicious
